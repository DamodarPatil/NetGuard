<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Shield shape -->
  <path d="M32 4L8 16v16c0 14.4 10.24 27.84 24 32 13.76-4.16 24-17.6 24-32V16L32 4z" 
        fill="url(#shieldGrad)" stroke="url(#strokeGrad)" stroke-width="2" stroke-linejoin="round"/>
  
  <!-- Network nodes and connections -->
  <!-- Central node -->
  <circle cx="32" cy="30" r="4" fill="#ffffff" opacity="0.95"/>
  
  <!-- Top node -->
  <circle cx="32" cy="16" r="2.5" fill="#ffffff" opacity="0.8"/>
  <!-- Bottom node -->
  <circle cx="32" cy="44" r="2.5" fill="#ffffff" opacity="0.8"/>
  <!-- Left node -->
  <circle cx="20" cy="34" r="2.5" fill="#ffffff" opacity="0.8"/>
  <!-- Right node -->
  <circle cx="44" cy="34" r="2.5" fill="#ffffff" opacity="0.8"/>
  <!-- Top-left node -->
  <circle cx="22" cy="22" r="2" fill="#ffffff" opacity="0.6"/>
  <!-- Top-right node -->
  <circle cx="42" cy="22" r="2" fill="#ffffff" opacity="0.6"/>
  
  <!-- Connection lines -->
  <line x1="32" y1="16" x2="32" y2="26" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
  <line x1="32" y1="34" x2="32" y2="44" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
  <line x1="20" y1="34" x2="28" y2="30" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
  <line x1="44" y1="34" x2="36" y2="30" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
  <line x1="22" y1="22" x2="28" y2="27" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
  <line x1="42" y1="22" x2="36" y2="27" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="strokeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
</svg>
